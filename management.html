<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理 - 蝦皮手續費計算機 2.0</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script>
        // Apply theme immediately to prevent flash
        (function() {
            const theme = localStorage.getItem('theme') || 'system';
            if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <link href="./dist/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./src/styles.css">
    <style>
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        
        .page-header {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 2.5rem 3rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        
        .page-header h1 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 2rem;
            color: var(--text-primary);
        }
        
        .page-header h1 i {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border-radius: 16px;
            font-size: 1.75rem;
        }
        
        .management-container {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            min-height: 400px;
        }
        
        /* Override default styles from management.js */
        #product-list-container {
            color: var(--text-primary);
        }
        
        #product-list-container .card,
        #product-list-container .bg-white {
            background: var(--bg-secondary) !important;
            border-color: var(--border-color) !important;
        }
        
        #product-list-container input,
        #product-list-container select,
        #product-list-container button {
            font-family: 'Noto Sans TC', sans-serif !important;
        }
        
        #product-list-container .btn-primary {
            background: var(--primary) !important;
            border-color: var(--primary) !important;
            color: white !important;
            font-weight: 600;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            transition: all 0.2s;
        }
        
        #product-list-container .btn-primary:hover {
            background: var(--primary-dark) !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(238, 77, 45, 0.3);
        }
        
        #product-list-container .form-control {
            background: var(--bg-secondary) !important;
            border: 2px solid var(--border-color) !important;
            border-radius: 12px;
            color: var(--text-primary) !important;
            padding: 0.75rem 1rem;
        }
        
        #product-list-container .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(238, 77, 45, 0.1) !important;
        }
        
        #product-list-container table {
            border-radius: 12px;
            overflow: hidden;
        }
        
        #product-list-container th {
            background: var(--bg-tertiary) !important;
            color: var(--text-primary) !important;
            font-weight: 600;
            padding: 1rem !important;
        }
        
        #product-list-container td {
            padding: 1rem !important;
            border-color: var(--border-color) !important;
        }
        
        #product-list-container tr:hover {
            background: var(--bg-tertiary) !important;
        }
        
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            gap: 1.5rem;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        
        @media (max-width: 768px) {
            main {
                margin: 1rem auto;
            }
            
            .page-header {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }
            
            .page-header h1 {
                font-size: 1.5rem;
            }
            
            .page-header h1 i {
                width: 48px;
                height: 48px;
                font-size: 1.5rem;
            }
            
            .management-container {
                padding: 1.5rem;
                border-radius: 16px;
            }
        }
    </style>
    <script type="module" src="./src/management.js"></script>
</head>
<body>
    <header id="main-header"></header>

    <main>
        <div class="page-header">
            <h1>
                <i class="bi bi-box-seam-fill"></i>
                <span>商品管理</span>
            </h1>
        </div>
        
        <div class="management-container">
            <div id="product-list-container">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p class="loading-text">載入商品資料中...</p>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>
</body>
</html>
