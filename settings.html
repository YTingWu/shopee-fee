<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賣場設定 - 蝦皮手續費計算機 2.0</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script>
        // Apply theme immediately to prevent flash
        (function() {
            const theme = localStorage.getItem('theme') || 'system';
            if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <link href="./dist/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./src/styles.css">
    <style>
        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        
        .page-header {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 2.5rem 3rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }
        
        .page-header h1 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 2rem;
            color: var(--text-primary);
        }
        
        .page-header h1 i {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--secondary) 0%, #2DD4BF 100%);
            color: white;
            border-radius: 16px;
            font-size: 1.75rem;
        }
        
        .page-description {
            margin-top: 1rem;
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .settings-container {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 2.5rem 3rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            min-height: 400px;
        }
        
        /* Override styles from settings.js */
        #settings-form-container {
            color: var(--text-primary);
        }
        
        #settings-form-container .form-group {
            margin-bottom: 2rem;
        }
        
        #settings-form-container .form-label,
        #settings-form-container label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary) !important;
            font-size: 0.95rem;
        }
        
        #settings-form-container .form-control,
        #settings-form-container input,
        #settings-form-container select {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            border: 2px solid var(--border-color) !important;
            border-radius: 12px;
            background: var(--bg-secondary) !important;
            color: var(--text-primary) !important;
            transition: all 0.2s;
            font-family: 'Noto Sans TC', sans-serif !important;
        }
        
        #settings-form-container .form-control:focus,
        #settings-form-container input:focus,
        #settings-form-container select:focus {
            outline: none;
            border-color: var(--secondary) !important;
            box-shadow: 0 0 0 4px rgba(38, 170, 153, 0.1) !important;
        }
        
        #settings-form-container .btn-primary {
            background: var(--secondary) !important;
            border: none !important;
            color: white !important;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        #settings-form-container .btn-primary:hover {
            background: #1F8D7F !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(38, 170, 153, 0.3);
        }
        
        #settings-form-container .form-check {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        #settings-form-container .form-check-input {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color) !important;
            border-radius: 6px;
            cursor: pointer;
        }
        
        #settings-form-container .form-check-input:checked {
            background-color: var(--secondary) !important;
            border-color: var(--secondary) !important;
        }
        
        #settings-form-container .form-check-label {
            cursor: pointer;
            margin: 0 !important;
        }
        
        #settings-form-container .card,
        #settings-form-container .bg-white {
            background: var(--bg-tertiary) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 16px !important;
            padding: 1.5rem !important;
            margin-bottom: 1.5rem;
        }
        
        #settings-form-container h2,
        #settings-form-container h3 {
            color: var(--text-primary) !important;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            gap: 1.5rem;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-color);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        
        .info-box {
            background: linear-gradient(135deg, rgba(38, 170, 153, 0.1) 0%, rgba(45, 212, 191, 0.1) 100%);
            border-left: 4px solid var(--secondary);
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .info-box p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            main {
                margin: 1rem auto;
            }
            
            .page-header {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }
            
            .page-header h1 {
                font-size: 1.5rem;
            }
            
            .page-header h1 i {
                width: 48px;
                height: 48px;
                font-size: 1.5rem;
            }
            
            .settings-container {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }
        }
    </style>
    <script type="module" src="./src/settings.js"></script>
</head>
<body>
    <header id="main-header"></header>

    <main>
        <div class="page-header">
            <h1>
                <i class="bi bi-gear-fill"></i>
                <span>賣場設定</span>
            </h1>
            <p class="page-description">
                配置您的賣家類型、免運方案、稅務等全域參數，一次設定多次使用
            </p>
        </div>
        
        <div class="info-box">
            <p>
                <i class="bi bi-info-circle-fill"></i>
                <strong>提示：</strong>這裡的設定將作為快速計算的預設值，您可以隨時修改。
            </p>
        </div>
        
        <div class="settings-container">
            <div id="settings-form-container">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p class="loading-text">載入設定中...</p>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>
</body>
</html>
